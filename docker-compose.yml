services:
  app:
    build: .
    image: copilot-hooks-web:0.1.0
    container_name: copilot-hooks-web
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      DATABASE_JDBC_URL: ${DATABASE_JDBC_URL:-jdbc:postgresql://172.17.1.1:5432/copilot_hooks?options=-c%20TimeZone%3DAsia%2FShanghai}
      DATABASE_USERNAME: ${DATABASE_USERNAME:-aiuser}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD:-1qa@WS3ed}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com}
      AI_API_KEY: ${AI_API_KEY:-changeme}
      AI_CHAT_MODEL: ${AI_CHAT_MODEL:-gpt-4o-mini}
      AI_EMBED_MODEL: ${AI_EMBED_MODEL:-text-embedding-3-small}
      AI_EMBED_DIMENSIONS: ${AI_EMBED_DIMENSIONS:-1536}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      SUMMARY_AUTO: ${SUMMARY_AUTO:-true}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      # Mount the built frontend output so pages can be replaced without rebuilding the jar.
      - ./frontend/dist:/app/frontend:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
